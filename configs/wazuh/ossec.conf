<!-- ossec.conf — Wazuh Manager configuration -->
<!-- SOC Automation Lab — SMALTER 2026        -->

<ossec_config>

  <!-- Global settings -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>yes</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@smalter-soc.local</email_from>
    <email_to>analyst@smalter-soc.local</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
  </global>

  <!-- Sysmon log collection -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Event logs -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Shuffle SOAR integration -->
  <integration>
    <name>shuffle</name>
    <hook_url>https://shuffler.io/api/v1/hooks/YOUR_HOOK_ID</hook_url>
    <rule_id>92212</rule_id>
    <alert_format>json</alert_format>
  </integration>

  <!-- Email alert integration -->
  <integration>
    <name>shuffle</name>
    <hook_url>https://shuffler.io/api/v1/hooks/YOUR_HOOK_ID</hook_url>
    <rule_id>100002</rule_id>
    <alert_format>json</alert_format>
  </integration>

  <!-- Active response -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
